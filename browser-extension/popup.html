<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #020617;
      color: #f8fafc;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .alert-card {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .alert-title {
      font-size: 11px;
      font-weight: 800;
      color: #fb7185;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .alert-text {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    .btn-focus {
      width: 100%;
      background: #e11d48;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-focus:hover {
      background: #be123c;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .form-control {
      width: 100%;
      box-sizing: border-box;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      padding: 8px 10px;
      font-size: 11px;
      outline: none;
    }
    .form-control:focus {
      border-color: #6366f1;
    }
    .btn-submit {
      width: 100%;
      background: linear-gradient(to right, #4f46e5, #7c3aed);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: 750;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover {
      opacity: 0.9;
    }
    .status-msg {
      font-size: 10px;
      color: #10b981;
      text-align: center;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🧠</span>
    <span class="logo">DeadlineIQ Companion</span>
  </div>

  <!-- Priority Deadline Alert Alert -->
  <div class="alert-card">
    <div class="alert-title">⚠️ Deadline Breach Risk</div>
    <div class="alert-text">DBMS Project due in 18 hours. Procrastination risk is high.</div>
    <button class="btn-focus" id="btnFocus">Start Focus Mode (Yes)</button>
  </div>

  <div class="section-title">Save Page as Task</div>
  <form id="taskForm">
    <div class="form-group">
      <label>Task Title</label>
      <input type="text" id="taskTitle" class="form-control" placeholder="e.g. Read research paper spec" required>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="taskPriority" class="form-control">
        <option value="high">High</option>
        <option value="medium" selected>Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <button type="submit" class="btn-submit">Add to DeadlineIQ</button>
  </form>
  <div class="status-msg" id="statusMsg">Task synced to your Cloud inbox! 🚀</div>

  <script src="popup.js"></script>
</body>
</html>
